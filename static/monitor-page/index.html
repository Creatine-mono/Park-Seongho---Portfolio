<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Portfolio Terminal</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: #000;
  color: #f2f2f2;
  font-family: Consolas, "Courier New", monospace;
  font-size: 13px;
  line-height: 1.55;
  cursor: none;
}

#cursor {
  position: fixed;
  top: 0;
  left: 0;
  width: 16px;
  height: 16px;
  z-index: 1000;
  pointer-events: none;
  filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.6));
}

#terminal {
  width: 100%;
  height: 100%;
  padding: 18px 20px;
}

#output {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

#output::-webkit-scrollbar {
  width: 6px;
}

#output::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.18);
}

.line {
  min-height: 1.55em;
}

.prompt-line {
  min-height: 1.55em;
}

.prompt-label,
.prompt-input {
  white-space: pre;
}

.dim {
  color: #bdbdbd;
}

.caret {
  display: inline-block;
  width: 8px;
  height: 15px;
  vertical-align: text-bottom;
  background: #f2f2f2;
  animation: blink 1s steps(1) infinite;
}

@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

#viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: none;
  border: 0;
  background: #d5d2c5;
  box-shadow: none;
  color: #1d1d1d;
  z-index: 900;
  cursor: default;
}

#viewer.open {
  display: block;
}

#viewer-titlebar {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 8px;
  background: linear-gradient(180deg, #2840b7 0%, #1f3197 100%);
  color: #fff;
  font: 700 12px Tahoma, sans-serif;
}

#viewer-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#viewer-close {
  width: 18px;
  height: 18px;
  border: 1px solid rgba(255, 255, 255, 0.7);
  background: #d8d8d8;
  color: #000;
  font: 700 11px Tahoma, sans-serif;
}

#viewer-content {
  height: calc(100% - 28px);
  overflow: auto;
  padding: 22px 28px;
  background:
    radial-gradient(circle at top left, rgba(255, 255, 255, 0.55), transparent 35%),
    linear-gradient(180deg, #efede3 0%, #e3e0d2 100%);
  font-family: "Times New Roman", serif;
}

#viewer-content.pdf-viewer {
  padding: 0;
  background: #bdb8a8;
}

#viewer-content.pdf-viewer iframe {
  width: 100%;
  height: 100%;
  border: 0;
  background: #8b8b8b;
}

#viewer-content::-webkit-scrollbar {
  width: 12px;
}

#viewer-content::-webkit-scrollbar-thumb {
  background: #b0b0b0;
  border: 2px solid #e5e5e5;
}

.doc-shell {
  min-height: 100%;
}

.doc-header {
  display: grid;
  grid-template-columns: 170px 1fr;
  gap: 18px;
  margin-bottom: 24px;
}

.doc-brand {
  font-weight: 700;
  font-size: 22px;
  line-height: 1.05;
}

.doc-brand small {
  display: block;
  margin-top: 6px;
  font-size: 14px;
}

.doc-title {
  font-size: 52px;
  line-height: 0.95;
  font-weight: 700;
}

.doc-subtitle {
  margin-top: 10px;
  font-size: 20px;
  font-weight: 700;
}

.doc-copy {
  margin-top: 18px;
  font-size: 16px;
  line-height: 1.45;
}

.doc-divider {
  margin: 22px 0 18px;
  border-top: 2px solid rgba(20, 20, 20, 0.6);
}

.doc-nav {
  display: grid;
  gap: 8px;
  width: 170px;
  margin-top: 14px;
  font-size: 17px;
}

.doc-nav span {
  text-decoration: underline;
}

.doc-section-title {
  margin: 8px 0 14px;
  font-size: 22px;
  font-weight: 700;
}

.doc-list {
  margin-left: 22px;
  font-size: 16px;
  line-height: 1.6;
}

.doc-card {
  padding: 14px 16px;
  margin: 12px 0;
  border: 1px solid rgba(20, 20, 20, 0.25);
  background: rgba(255, 255, 255, 0.35);
}

.doc-meta {
  margin-top: 8px;
  font-size: 14px;
  color: #444;
}

.doc-kv {
  display: grid;
  gap: 8px;
  margin-top: 10px;
  font-size: 16px;
}

.doc-kv div strong {
  display: inline-block;
  width: 100px;
}

.doc-link {
  color: #4b4fa8;
  text-decoration: underline;
}

.doc-banner {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
}

.doc-banner-icon {
  width: 40px;
  height: 40px;
  border: 1px solid rgba(20, 20, 20, 0.35);
  background: rgba(255, 255, 255, 0.4);
  display: grid;
  place-items: center;
  font-size: 22px;
}

.doc-image {
  width: 100%;
  margin-top: 18px;
  border: 1px solid rgba(20, 20, 20, 0.25);
  display: block;
}

.doc-project-title {
  font-size: 28px;
  font-weight: 700;
}

.doc-project-sub {
  margin-top: 6px;
  font-size: 15px;
  color: #555;
}
</style>
</head>
<body>
<svg id="cursor" viewBox="0 0 16 16" fill="none">
  <line x1="8" y1="0" x2="8" y2="6" stroke="#ffffff" stroke-width="1.1"></line>
  <line x1="8" y1="10" x2="8" y2="16" stroke="#ffffff" stroke-width="1.1"></line>
  <line x1="0" y1="8" x2="6" y2="8" stroke="#ffffff" stroke-width="1.1"></line>
  <line x1="10" y1="8" x2="16" y2="8" stroke="#ffffff" stroke-width="1.1"></line>
</svg>

<div id="terminal">
  <div id="output"></div>
</div>

<div id="viewer">
  <div id="viewer-titlebar">
    <div id="viewer-title">viewer</div>
    <button id="viewer-close" type="button">X</button>
  </div>
  <div id="viewer-content"></div>
</div>

<script>
const displayName = "\uBC15\uC131\uD638_\uD3EC\uD2B8\uD3F4\uB9AC\uC624";
const homeDisplayPath = "C:\\Users\\" + displayName;

const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", (event) => {
  cursor.style.left = (event.clientX - 8) + "px";
  cursor.style.top = (event.clientY - 8) + "px";
  window.parent.postMessage({ type: "mousemove", clientX: event.clientX, clientY: event.clientY }, "*");
});

["mousedown", "mouseup"].forEach((type) => {
  document.addEventListener(type, (event) => {
    window.parent.postMessage({ type, clientX: event.clientX, clientY: event.clientY }, "*");
  });
});

["keydown", "keyup"].forEach((type) => {
  document.addEventListener(type, (event) => {
    window.parent.postMessage({ type, key: event.key }, "*");
  });
});

const output = document.getElementById("output");
const viewer = document.getElementById("viewer");
const viewerTitle = document.getElementById("viewer-title");
const viewerContent = document.getElementById("viewer-content");
const viewerClose = document.getElementById("viewer-close");

let buffer = "";
let history = [];
let historyIndex = -1;
let activePromptLine = null;
let activePromptInput = null;
let currentPath = homeDisplayPath;

const files = {
  "C:\\": { type: "dir", children: ["Users"] },
  "C:\\Users": { type: "dir", children: [displayName] },
  [homeDisplayPath]: { type: "dir", children: ["profile", "contact", "resume"] },
  [homeDisplayPath + "\\profile"]: { type: "dir", children: ["profile.txt"] },
  [homeDisplayPath + "\\contact"]: { type: "dir", children: ["contact.txt"] },
  [homeDisplayPath + "\\resume"]: { type: "dir", children: ["resume.txt", "resume.pdf"] },
  [homeDisplayPath + "\\profile\\profile.txt"]: {
    type: "file",
    title: "Profile",
    content: `
      <div class="doc-shell">
        <div class="doc-header">
          <div>
            <div class="doc-brand">Park<br>Seongho<small>Portfolio '26</small></div>
            <div class="doc-nav">
              <span>HOME</span>
              <span>PROFILE</span>
              <span>CONTACT</span>
              <span>RESUME</span>
            </div>
          </div>
          <div>
            <div class="doc-title">Welcome</div>
            <div class="doc-subtitle">I'm Park Seongho</div>
            <div class="doc-copy">
              I am focused on AI security and product-oriented security engineering. My work centers on LLM application
              security, adversarial machine learning, and building systems that are clear to review and practical to operate.
            </div>
            <div class="doc-copy">
              Thank you for taking the time to look through this portfolio. I wanted the experience to feel like opening a
              workstation, moving through folders, and reading documents directly rather than clicking through generic cards.
              If you would like to contact me, open the <span class="doc-link">contact</span> folder, or view the original
              resume file in the <span class="doc-link">resume</span> folder.
            </div>
            <div class="doc-divider"></div>
            <div class="doc-banner">
              <div class="doc-banner-icon">+</div>
              <div>
                <div class="doc-section-title" style="margin:0;">Looking for my resume?</div>
                <div class="doc-meta">Open <strong>resume\\resume.pdf</strong> with <strong>cat</strong> to view the full file.</div>
              </div>
            </div>
            <div class="doc-divider"></div>
            <div class="doc-section-title">About Me</div>
            <div class="doc-kv">
              <div><strong>Role</strong> AI Security Engineer</div>
              <div><strong>Focus</strong> LLM Security, Adversarial ML, Product Security</div>
              <div><strong>Location</strong> Seoul, South Korea</div>
              <div><strong>Style</strong> Terminal-first, implementation-oriented, review-driven</div>
            </div>
            <div class="doc-copy">
              My interest in security comes from wanting to understand how systems actually fail in practice. That led me
              toward AI security, where model behavior, application logic, and product constraints all interact. I enjoy
              work that sits between research and implementation: reviewing attack surfaces, testing assumptions, and
              turning findings into something a team can maintain.
            </div>
            <img class="doc-image" src="/images/preview-image.jpg" alt="Park Seongho profile image">
          </div>
        </div>
      </div>
    `
  },
  [homeDisplayPath + "\\contact\\contact.txt"]: {
    type: "file",
    title: "Contact",
    content: `
      <div class="doc-shell">
        <div class="doc-title" style="font-size:40px;">Contact</div>
        <div class="doc-divider"></div>
        <div class="doc-copy">
          If you want to discuss AI security, product hardening, or portfolio work, the fastest route is email.
        </div>
        <div class="doc-card">
          <div class="doc-kv">
            <div><strong>Email</strong> psh243360@gmail.com</div>
            <div><strong>GitHub</strong> github.com/Park-Seongho</div>
            <div><strong>LinkedIn</strong> linkedin.com/in/parkseongho</div>
            <div><strong>Location</strong> Seoul, South Korea</div>
          </div>
        </div>
      </div>
    `
  },
  [homeDisplayPath + "\\resume\\resume.txt"]: {
    type: "file",
    title: "Resume",
    content: `
      <div class="doc-shell">
        <div class="doc-title" style="font-size:40px;">Resume</div>
        <div class="doc-divider"></div>
        <div class="doc-copy">AI Security Engineer based in Seoul.</div>
        <div class="doc-copy">Focus on LLM security, adversarial ML, and practical product defense.</div>
        <div class="doc-copy">For the original resume file, run <strong>cat resume.pdf</strong>.</div>
      </div>
    `
  },
  [homeDisplayPath + "\\resume\\resume.pdf"]: {
    type: "pdf",
    title: "Resume PDF",
    src: "/docs/resume.pdf"
  }
};

function addLine(text, className = "") {
  const line = document.createElement("div");
  line.className = "line" + (className ? " " + className : "");
  line.textContent = text;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
}

function promptText() {
  return currentPath + ">";
}

function ensurePrompt() {
  if (activePromptLine) return;

  activePromptLine = document.createElement("div");
  activePromptLine.className = "prompt-line";

  const label = document.createElement("span");
  label.className = "prompt-label";
  label.textContent = promptText();

  activePromptInput = document.createElement("span");
  activePromptInput.className = "prompt-input";

  const caret = document.createElement("span");
  caret.className = "caret";

  activePromptLine.appendChild(label);
  activePromptLine.appendChild(activePromptInput);
  activePromptLine.appendChild(caret);
  output.appendChild(activePromptLine);
  output.scrollTop = output.scrollHeight;
}

function updatePrompt() {
  if (!activePromptLine) return;
  activePromptLine.querySelector(".prompt-label").textContent = promptText();
}

function updateBufferView() {
  if (!activePromptInput) return;
  activePromptInput.textContent = buffer;
  output.scrollTop = output.scrollHeight;
}

function commitPrompt(command) {
  if (!activePromptLine) return;
  const line = document.createElement("div");
  line.className = "line";
  line.textContent = promptText() + command;
  output.replaceChild(line, activePromptLine);
  activePromptLine = null;
  activePromptInput = null;
}

function normalizePath(path) {
  return path.replace(/\//g, "\\").replace(/\\\\+/g, "\\");
}

function resolvePath(input) {
  const target = normalizePath((input || "").trim());
  if (!target) return currentPath;

  let working;
  if (/^[a-zA-Z]:\\/.test(target)) {
    working = normalizePath(target);
  } else if (target === "\\") {
    working = "C:\\";
  } else if (target.startsWith("\\")) {
    working = "C:" + normalizePath(target);
  } else {
    working = currentPath + "\\" + target;
  }

  const driveMatch = working.match(/^[a-zA-Z]:/);
  const drive = driveMatch ? driveMatch[0] : "C:";
  const tail = working.slice(drive.length).split("\\").filter(Boolean);
  const result = [];

  for (const part of tail) {
    if (part === ".") continue;
    if (part === "..") {
      result.pop();
      continue;
    }
    result.push(part);
  }

  return result.length ? drive + "\\" + result.join("\\") : drive + "\\";
}

function getEntry(path) {
  const normalized = path.endsWith("\\") && path.length > 3 ? path.slice(0, -1) : path;
  return files[normalized];
}

function openViewer(entryPath, entry) {
  viewerTitle.textContent = entryPath;
  viewerContent.classList.remove("pdf-viewer");

  if (entry.type === "pdf") {
    viewerContent.classList.add("pdf-viewer");
    viewerContent.innerHTML = '<iframe src="' + entry.src + '"></iframe>';
  } else {
    viewerContent.innerHTML = entry.content;
  }

  viewer.classList.add("open");
}

viewerClose.addEventListener("click", () => {
  viewer.classList.remove("open");
});

const commands = {
  help() {
    addLine("ls  cd  cat  pwd  whoami  clear  help");
  },
  ls(args) {
    const targetPath = resolvePath(args || ".");
    const entry = getEntry(targetPath);
    if (!entry || entry.type !== "dir") {
      addLine("File Not Found");
      return;
    }
    addLine(entry.children.join("    "));
  },
  cd(args) {
    const targetPath = resolvePath(args || homeDisplayPath);
    const entry = getEntry(targetPath);
    if (!entry || entry.type !== "dir") {
      addLine("The system cannot find the path specified.");
      return;
    }
    currentPath = targetPath;
  },
  cat(args) {
    if (!args) {
      addLine("The syntax of the command is incorrect.");
      return;
    }
    const targetPath = resolvePath(args);
    const entry = getEntry(targetPath);
    if (!entry || (entry.type !== "file" && entry.type !== "pdf")) {
      addLine("The system cannot find the file specified.");
      return;
    }
    openViewer(targetPath, entry);
    addLine("Opening " + args);
  },
  pwd() {
    addLine(currentPath);
  },
  whoami() {
    addLine(displayName);
  },
  clear() {
    output.innerHTML = "";
  }
};

function runCommand(raw) {
  const command = raw.trim();
  if (!command) {
    commitPrompt("");
    ensurePrompt();
    updatePrompt();
    return;
  }

  history.unshift(command);
  if (history.length > 40) history.pop();
  historyIndex = -1;

  commitPrompt(command);
  const parts = command.split(/\s+/);
  const name = parts[0].toLowerCase();
  const args = command.slice(parts[0].length).trim();

  if (commands[name]) {
    commands[name](args);
  } else {
    addLine("'" + name + "' is not recognized as an internal or external command,");
    addLine("operable program or batch file.");
  }

  ensurePrompt();
  updatePrompt();
}

addLine("Microsoft Windows [Version 10.0.19045.6466]");
addLine("(c) Microsoft Corporation. All rights reserved.");
addLine("");
ensurePrompt();
updatePrompt();

document.addEventListener("keydown", (event) => {
  if (event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey) {
    buffer += event.key;
    updateBufferView();
    return;
  }

  if (event.key === "Backspace") {
    buffer = buffer.slice(0, -1);
    updateBufferView();
    return;
  }

  if (event.key === "Enter") {
    runCommand(buffer);
    buffer = "";
    updateBufferView();
    return;
  }

  if (event.key === "ArrowUp") {
    if (historyIndex < history.length - 1) {
      historyIndex += 1;
      buffer = history[historyIndex];
      updateBufferView();
    }
    return;
  }

  if (event.key === "ArrowDown") {
    if (historyIndex > 0) {
      historyIndex -= 1;
      buffer = history[historyIndex];
    } else {
      historyIndex = -1;
      buffer = "";
    }
    updateBufferView();
  }
});
</script>
</body>
</html>
