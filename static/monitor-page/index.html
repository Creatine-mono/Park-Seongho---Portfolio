<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #000;
  color: #f2f2f2;
  font-family: Consolas, "Courier New", monospace;
  font-size: 13px;
  line-height: 1.55;
  cursor: none;
}
#cursor {
  position: fixed;
  top: 0;
  left: 0;
  width: 16px;
  height: 16px;
  z-index: 1000;
  pointer-events: none;
  filter: drop-shadow(0 0 4px rgba(255,255,255,0.6));
}
#terminal { width: 100%; height: 100%; padding: 18px 20px; }
#output {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}
#output::-webkit-scrollbar { width: 6px; }
#output::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); }
.line, .prompt-line { min-height: 1.55em; }
.prompt-label, .prompt-input { white-space: pre; }
.dim { color: #bdbdbd; }
.caret {
  display: inline-block;
  width: 8px;
  height: 15px;
  vertical-align: text-bottom;
  background: #f2f2f2;
  animation: blink 1s steps(1) infinite;
}
@keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }

#viewer {
  position: fixed;
  inset: 0;
  display: none;
  background: #d5d2c5;
  color: #1d1d1d;
  z-index: 900;
  cursor: default;
}
#viewer.open { display: block; }
#viewer.windowed {
  top: 18px;
  left: 34px;
  width: calc(100vw - 68px);
  height: calc(100vh - 36px);
  border: 1px solid #6e6e6e;
  box-shadow: 0 10px 30px rgba(0,0,0,0.45);
}
#viewer-titlebar {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 8px;
  background: linear-gradient(180deg, #2840b7 0%, #1f3197 100%);
  color: #fff;
  font: 700 12px Tahoma, sans-serif;
}
#viewer-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#viewer-actions { display: flex; gap: 4px; }
#viewer-toggle, #viewer-close {
  width: 18px;
  height: 18px;
  border: 1px solid rgba(255,255,255,0.7);
  background: #d8d8d8;
  color: #000;
  font: 700 11px Tahoma, sans-serif;
}
#viewer-content {
  height: calc(100% - 28px);
  overflow: auto;
  padding: 22px 28px;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 35%),

}
#viewer-content::-webkit-scrollbar { width: 12px; }
#viewer-content::-webkit-scrollbar-thumb {
  background: #b0b0b0;
  border: 2px solid #e5e5e5;
}
#viewer-content.pdf-viewer { padding: 0; background: #bdb8a8; }
#viewer-content.pdf-viewer iframe {

  height: 100%;

  background: #8b8b8b;

document.addEventListener("mousemove", (event) => {
  cursor.style.left = (event.clientX - 8) + "px";
  cursor.style.top = (event.clientY - 8) + "px";
  window.parent.postMessage({ type: "mousemove", clientX: event.clientX, clientY: event.clientY }, "*");
});
["mousedown", "mouseup"].forEach((type) => {
  document.addEventListener(type, (event) => {
    window.parent.postMessage({ type, clientX: event.clientX, clientY: event.clientY }, "*");
  });
});
["keydown", "keyup"].forEach((type) => {
  document.addEventListener(type, (event) => {
    window.parent.postMessage({ type, key: event.key }, "*");
  });
});

  return `
    <div class="doc-brand">Park<br>Seongho<small>Portfolio '26</small></div>
    <div class="doc-nav">
      ${links.map(([path, label, docKey]) => {
        const classes = ["doc-side-link"];

        return `<a href="#" class="${classes.join(" ")}" data-open-file="${path}" data-doc="${docKey}">${label}</a>`;
      }).join("")}
    </div>
  `;
}

function addLine(text, className = "") {
  const line = document.createElement("div");
  line.className = "line" + (className ? " " + className : "");
  line.textContent = text;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
}

function promptText() {
  return currentPath + ">";
}

function ensurePrompt() {
  if (activePromptLine) return;
  activePromptLine = document.createElement("div");
  activePromptLine.className = "prompt-line";
  const label = document.createElement("span");
  label.className = "prompt-label";
  label.textContent = promptText();
  activePromptInput = document.createElement("span");
  activePromptInput.className = "prompt-input";
  const caret = document.createElement("span");
  caret.className = "caret";
  activePromptLine.appendChild(label);
  activePromptLine.appendChild(activePromptInput);
  activePromptLine.appendChild(caret);
  output.appendChild(activePromptLine);
  output.scrollTop = output.scrollHeight;
}

function updatePrompt() {
  if (!activePromptLine) return;
  activePromptLine.querySelector(".prompt-label").textContent = promptText();
}

function updateBufferView() {
  if (!activePromptInput) return;
  activePromptInput.textContent = buffer;
  output.scrollTop = output.scrollHeight;
}

function commitPrompt(command) {
  if (!activePromptLine) return;
  const line = document.createElement("div");
  line.className = "line";
  line.textContent = promptText() + command;
  output.replaceChild(line, activePromptLine);
  activePromptLine = null;
  activePromptInput = null;
}

function normalizePath(path) {
  return path.replace(/\//g, "\\").replace(/\\\\+/g, "\\");
}

function resolvePath(input) {
  const target = normalizePath((input || "").trim());
  if (!target) return currentPath;
  let working;
  if (/^[a-zA-Z]:\\/.test(target)) {
    working = target;
  } else if (target === "\\") {
    working = "C:\\";
  } else if (target.startsWith("\\")) {
    working = "C:" + target;
  } else {
    working = currentPath + "\\" + target;
  }
  const driveMatch = working.match(/^[a-zA-Z]:/);
  const drive = driveMatch ? driveMatch[0] : "C:";
  const tail = working.slice(drive.length).split("\\").filter(Boolean);
  const result = [];
  for (const part of tail) {
    if (part === ".") continue;
    if (part === "..") { result.pop(); continue; }
    result.push(part);
  }
  return result.length ? drive + "\\" + result.join("\\") : drive + "\\";
}

function getEntry(path) {
  const normalized = path.endsWith("\\") && path.length > 3 ? path.slice(0, -1) : path;
  return files[normalized];
}

function resolveDocPath(relative) {
  return homeDisplayPath + "\\" + normalizePath(relative);
}

function markVisited(docKey) {
  if (docKey) visitedDocs.add(docKey);
}

function syncVisitedLinks() {
  viewerContent.querySelectorAll(".doc-inline-link[data-doc], .doc-button[data-doc]").forEach((link) => {
    const docKey = link.getAttribute("data-doc");
    link.classList.toggle("visited", visitedDocs.has(docKey));
  });
}

function openViewer(entryPath, entry, docKey) {
  viewerTitle.textContent = entryPath;
  viewerContent.classList.remove("pdf-viewer");
  viewer.classList.remove("windowed");
  markVisited(docKey);

  if (entry.type === "pdf") {
    viewerContent.classList.add("pdf-viewer");
    viewerContent.innerHTML = '<iframe src="' + entry.src + '"></iframe>';
  } else {
    viewerContent.innerHTML = entry.content;
    syncVisitedLinks();
  }

  viewer.classList.add("open");
}

viewerClose.addEventListener("click", () => {
  viewer.classList.remove("open");
});

viewerToggle.addEventListener("click", () => {
  viewer.classList.toggle("windowed");
});

const commands = {
  help() { addLine("ls  cd  cat  pwd  whoami  clear  help"); },
  ls(args) {
    const targetPath = resolvePath(args || ".");
    const entry = getEntry(targetPath);
    if (!entry || entry.type !== "dir") { addLine("File Not Found"); return; }
    addLine(entry.children.join("    "));
  },
  cd(args) {
    const targetPath = resolvePath(args || homeDisplayPath);
    const entry = getEntry(targetPath);
    if (!entry || entry.type !== "dir") {
      addLine("The system cannot find the path specified.");
      return;
    }
    currentPath = targetPath;
  },
  cat(args) {
    if (!args) { addLine("The syntax of the command is incorrect."); return; }
    const targetPath = resolvePath(args);
    const entry = getEntry(targetPath);
    if (!entry || (entry.type !== "file" && entry.type !== "pdf")) {
      addLine("The system cannot find the file specified.");
      return;
    }
    openViewer(targetPath, entry, targetPath.split("\\").pop());
    addLine("Opening " + args);
  },
  pwd() { addLine(currentPath); },
  whoami() { addLine(displayName); },
  clear() { output.innerHTML = ""; }
};

function runCommand(raw) {
  const command = raw.trim();
  if (!command) {
    commitPrompt("");
    ensurePrompt();
    updatePrompt();
    return;
  }
  history.unshift(command);
  if (history.length > 40) history.pop();
  historyIndex = -1;
  commitPrompt(command);
  const parts = command.split(/\s+/);
  const name = parts[0].toLowerCase();
  const args = command.slice(parts[0].length).trim();
  if (commands[name]) {
    commands[name](args);
  } else {
    addLine("'" + name + "' is not recognized as an internal or external command,");
    addLine("operable program or batch file.");
  }
  ensurePrompt();
  updatePrompt();
}

viewerContent.addEventListener("click", (event) => {
  const link = event.target.closest("a");
  if (!link) return;

  if (link.hasAttribute("data-open-file")) {
    event.preventDefault();
    const relative = link.getAttribute("data-open-file");
    const targetPath = resolveDocPath(relative);
    const entry = getEntry(targetPath);
    if (entry) openViewer(targetPath, entry, link.getAttribute("data-doc") || relative.split("\\").pop());
    return;
  }

  if ((link.classList.contains("doc-inline-link") || link.classList.contains("doc-button")) && link.href) {
    const docKey = link.getAttribute("data-doc") || link.href;
    markVisited(docKey);
    link.classList.add("visited");
  }
});

viewerContent.addEventListener("submit", async (event) => {
  if (event.target.id !== "contact-form") return;
  event.preventDefault();
  const form = event.target;
  const status = viewerContent.querySelector("#contact-status");
  const payload = Object.fromEntries(new FormData(form).entries());
  status.textContent = "Sending...";
  try {
    const response = await fetch("/api/send-email", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error("send failed");
    status.textContent = "Message sent successfully.";
    form.reset();
  } catch (error) {
    status.textContent = "Failed to send message.";
  }
});

addLine("");
ensurePrompt();
updatePrompt();

document.addEventListener("keydown", (event) => {
  if (event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey) {
    buffer += event.key;
    updateBufferView();
    return;
  }
  if (event.key === "Backspace") {
    buffer = buffer.slice(0, -1);
    updateBufferView();
    return;
  }
  if (event.key === "Enter") {
    runCommand(buffer);
    buffer = "";
    updateBufferView();
    return;
  }
  if (event.key === "ArrowUp") {
    if (historyIndex < history.length - 1) {
      historyIndex += 1;
      buffer = history[historyIndex];
      updateBufferView();
    }
    return;
  }
  if (event.key === "ArrowDown") {
    if (historyIndex > 0) {
      historyIndex -= 1;
      buffer = history[historyIndex];
    } else {
      historyIndex = -1;
      buffer = "";
    }
    updateBufferView();
  }
});
