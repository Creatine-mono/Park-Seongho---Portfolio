<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Portfolio Terminal</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: #000;
  color: #f2f2f2;
  font-family: Consolas, "Courier New", monospace;
  font-size: 13px;
  line-height: 1.55;
  cursor: none;
}

#cursor {
  position: fixed;
  top: 0;
  left: 0;
  width: 16px;
  height: 16px;
  z-index: 1000;
  pointer-events: none;
  filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.6));
}

#terminal {
  width: 100%;
  height: 100%;
  padding: 18px 20px;
}

#output {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

#output::-webkit-scrollbar {
  width: 6px;
}

#output::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.18);
}

.line {
  min-height: 1.55em;
}

.prompt-line {
  min-height: 1.55em;
}

.prompt-label,
.prompt-input {
  white-space: pre;
}

.dim {
  color: #bdbdbd;
}

.caret {
  display: inline-block;
  width: 8px;
  height: 15px;
  vertical-align: text-bottom;
  background: #f2f2f2;
  animation: blink 1s steps(1) infinite;
}

@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

#viewer {
  position: fixed;
  top: 22px;
  left: 90px;
  width: 760px;
  height: 560px;
  display: none;
  border: 1px solid #6e6e6e;
  background: #d5d2c5;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
  color: #1d1d1d;
  z-index: 900;
  cursor: default;
}

#viewer.open {
  display: block;
}

#viewer-titlebar {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 8px;
  background: linear-gradient(180deg, #2840b7 0%, #1f3197 100%);
  color: #fff;
  font: 700 12px Tahoma, sans-serif;
}

#viewer-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#viewer-close {
  width: 18px;
  height: 18px;
  border: 1px solid rgba(255, 255, 255, 0.7);
  background: #d8d8d8;
  color: #000;
  font: 700 11px Tahoma, sans-serif;
}

#viewer-content {
  height: calc(100% - 28px);
  overflow: auto;
  padding: 22px 28px;
  background:
    radial-gradient(circle at top left, rgba(255, 255, 255, 0.55), transparent 35%),
    linear-gradient(180deg, #efede3 0%, #e3e0d2 100%);
  font-family: "Times New Roman", serif;
}

#viewer-content::-webkit-scrollbar {
  width: 12px;
}

#viewer-content::-webkit-scrollbar-thumb {
  background: #b0b0b0;
  border: 2px solid #e5e5e5;
}

.doc-shell {
  min-height: 100%;
}

.doc-header {
  display: grid;
  grid-template-columns: 170px 1fr;
  gap: 18px;
  margin-bottom: 24px;
}

.doc-brand {
  font-weight: 700;
  font-size: 22px;
  line-height: 1.05;
}

.doc-brand small {
  display: block;
  margin-top: 6px;
  font-size: 14px;
}

.doc-title {
  font-size: 52px;
  line-height: 0.95;
  font-weight: 700;
}

.doc-subtitle {
  margin-top: 10px;
  font-size: 20px;
  font-weight: 700;
}

.doc-copy {
  margin-top: 18px;
  font-size: 16px;
  line-height: 1.45;
}

.doc-divider {
  margin: 22px 0 18px;
  border-top: 2px solid rgba(20, 20, 20, 0.6);
}

.doc-nav {
  display: grid;
  gap: 8px;
  width: 170px;
  margin-top: 14px;
  font-size: 17px;
}

.doc-nav span {
  text-decoration: underline;
}

.doc-section-title {
  margin: 8px 0 14px;
  font-size: 22px;
  font-weight: 700;
}

.doc-list {
  margin-left: 22px;
  font-size: 16px;
  line-height: 1.6;
}

.doc-card {
  padding: 14px 16px;
  margin: 12px 0;
  border: 1px solid rgba(20, 20, 20, 0.25);
  background: rgba(255, 255, 255, 0.35);
}
</style>
</head>
<body>
<svg id="cursor" viewBox="0 0 16 16" fill="none">
  <line x1="8" y1="0" x2="8" y2="6" stroke="#ffffff" stroke-width="1.1"></line>
  <line x1="8" y1="10" x2="8" y2="16" stroke="#ffffff" stroke-width="1.1"></line>
  <line x1="0" y1="8" x2="6" y2="8" stroke="#ffffff" stroke-width="1.1"></line>
  <line x1="10" y1="8" x2="16" y2="8" stroke="#ffffff" stroke-width="1.1"></line>
</svg>

<div id="terminal">
  <div id="output"></div>
</div>

<div id="viewer">
  <div id="viewer-titlebar">
    <div id="viewer-title">viewer</div>
    <button id="viewer-close" type="button">X</button>
  </div>
  <div id="viewer-content"></div>
</div>

<script>
const displayName = "\uBC15\uC131\uD638_\uD3EC\uD2B8\uD3F4\uB9AC\uC624";
const homeDisplayPath = "C:\\Users\\" + displayName;

const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", (event) => {
  cursor.style.left = (event.clientX - 8) + "px";
  cursor.style.top = (event.clientY - 8) + "px";
  window.parent.postMessage({ type: "mousemove", clientX: event.clientX, clientY: event.clientY }, "*");
});

["mousedown", "mouseup"].forEach((type) => {
  document.addEventListener(type, (event) => {
    window.parent.postMessage({ type, clientX: event.clientX, clientY: event.clientY }, "*");
  });
});

["keydown", "keyup"].forEach((type) => {
  document.addEventListener(type, (event) => {
    window.parent.postMessage({ type, key: event.key }, "*");
  });
});

const output = document.getElementById("output");
const viewer = document.getElementById("viewer");
const viewerTitle = document.getElementById("viewer-title");
const viewerContent = document.getElementById("viewer-content");
const viewerClose = document.getElementById("viewer-close");

let buffer = "";
let history = [];
let historyIndex = -1;
let activePromptLine = null;
let activePromptInput = null;
let currentPath = homeDisplayPath;

const files = {
  "C:\\Users": { type: "dir", children: [displayName] },
  [homeDisplayPath]: { type: "dir", children: ["about", "projects", "contact", "resume"] },
  [homeDisplayPath + "\\about"]: { type: "dir", children: ["profile.txt", "skills.txt", "experience.txt"] },
  [homeDisplayPath + "\\projects"]: { type: "dir", children: ["adversarial_ml.txt", "llm_scanner.txt", "intrusion_detection.txt"] },
  [homeDisplayPath + "\\contact"]: { type: "dir", children: ["contact.txt"] },
  [homeDisplayPath + "\\resume"]: { type: "dir", children: ["resume.txt"] },
  [homeDisplayPath + "\\about\\profile.txt"]: {
    type: "file",
    title: "Profile",
    content: `
      <div class="doc-shell">
        <div class="doc-header">
          <div>
            <div class="doc-brand">Park<br>Seongho<small>Portfolio '26</small></div>
            <div class="doc-nav">
              <span>HOME</span>
              <span>ABOUT</span>
              <span>EXPERIENCE</span>
              <span>PROJECTS</span>
              <span>CONTACT</span>
            </div>
          </div>
          <div>
            <div class="doc-title">Welcome</div>
            <div class="doc-subtitle">I'm Park Seongho</div>
            <div class="doc-copy">
              I build AI security systems, red-team LLM applications, and review model risk in production environments.
              This portfolio is presented as a terminal-driven workspace, but the document viewer opens a cleaner summary
              when you inspect files with <strong>cat</strong>.
            </div>
            <div class="doc-divider"></div>
            <div class="doc-section-title">About Me</div>
            <div class="doc-copy">
              My focus is practical AI security: prompt injection defense, model robustness evaluation, and threat modeling
              for products that actually ship. I prefer systems that feel operational, not decorative.
            </div>
          </div>
        </div>
      </div>
    `
  },
  [homeDisplayPath + "\\about\\skills.txt"]: {
    type: "file",
    title: "Skills",
    content: `
      <div class="doc-shell">
        <div class="doc-title" style="font-size:46px;">Skills</div>
        <div class="doc-subtitle">Core Areas</div>
        <div class="doc-divider"></div>
        <div class="doc-card">
          <div class="doc-section-title">AI Security</div>
          <ul class="doc-list">
            <li>LLM prompt injection analysis</li>
            <li>Adversarial machine learning</li>
            <li>Model robustness testing</li>
            <li>Threat modeling for AI applications</li>
          </ul>
        </div>
        <div class="doc-card">
          <div class="doc-section-title">Engineering</div>
          <ul class="doc-list">
            <li>Python, TypeScript, PyTorch, TensorFlow</li>
            <li>Docker, AWS, API security, monitoring</li>
            <li>Terminal-first workflows and review tooling</li>
          </ul>
        </div>
      </div>
    `
  },
  [homeDisplayPath + "\\about\\experience.txt"]: {
    type: "file",
    title: "Experience",
    content: `
      <div class="doc-shell">
        <div class="doc-title" style="font-size:46px;">Experience</div>
        <div class="doc-divider"></div>
        <div class="doc-card">
          <div class="doc-section-title">AI Security Engineer</div>
          <div class="doc-copy">Security reviews, prompt-injection evaluation, red-teaming, and applied hardening for LLM products.</div>
        </div>
        <div class="doc-card">
          <div class="doc-section-title">Security Research</div>
          <div class="doc-copy">Research on adversarial ML, system misuse paths, and operational defenses for model-serving infrastructure.</div>
        </div>
      </div>
    `
  },
  [homeDisplayPath + "\\projects\\adversarial_ml.txt"]: {
    type: "file",
    title: "Adversarial ML Defense Framework",
    content: `
      <div class="doc-shell">
        <div class="doc-title" style="font-size:40px;">Adversarial ML Defense Framework</div>
        <div class="doc-divider"></div>
        <div class="doc-copy">
          Toolkit for evaluating and hardening models under adversarial pressure. Includes attack simulation,
          test reporting, and mitigation validation.
        </div>
      </div>
    `
  },
  [homeDisplayPath + "\\projects\\llm_scanner.txt"]: {
    type: "file",
    title: "LLM Prompt Injection Scanner",
    content: `
      <div class="doc-shell">
        <div class="doc-title" style="font-size:40px;">LLM Prompt Injection Scanner</div>
        <div class="doc-divider"></div>
        <div class="doc-copy">
          Scanner focused on jailbreaks, prompt overrides, and data exfiltration patterns in LLM-based products.
        </div>
      </div>
    `
  },
  [homeDisplayPath + "\\projects\\intrusion_detection.txt"]: {
    type: "file",
    title: "AI-Powered Intrusion Detection",
    content: `
      <div class="doc-shell">
        <div class="doc-title" style="font-size:40px;">AI-Powered Intrusion Detection</div>
        <div class="doc-divider"></div>
        <div class="doc-copy">
          Detection pipeline that combines anomaly scoring with operator-friendly triage for security events.
        </div>
      </div>
    `
  },
  [homeDisplayPath + "\\contact\\contact.txt"]: {
    type: "file",
    title: "Contact",
    content: `
      <div class="doc-shell">
        <div class="doc-title" style="font-size:40px;">Contact</div>
        <div class="doc-divider"></div>
        <div class="doc-copy">Email: psh243360@gmail.com</div>
        <div class="doc-copy">GitHub: github.com/Park-Seongho</div>
        <div class="doc-copy">LinkedIn: linkedin.com/in/parkseongho</div>
      </div>
    `
  },
  [homeDisplayPath + "\\resume\\resume.txt"]: {
    type: "file",
    title: "Resume",
    content: `
      <div class="doc-shell">
        <div class="doc-title" style="font-size:40px;">Resume</div>
        <div class="doc-divider"></div>
        <div class="doc-copy">AI Security Engineer based in Seoul.</div>
        <div class="doc-copy">Focus on LLM security, adversarial ML, and practical product defense.</div>
      </div>
    `
  }
};

function addLine(text, className = "") {
  const line = document.createElement("div");
  line.className = "line" + (className ? " " + className : "");
  line.textContent = text;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
}

function promptText() {
  return currentPath + ">";
}

function ensurePrompt() {
  if (activePromptLine) return;

  activePromptLine = document.createElement("div");
  activePromptLine.className = "prompt-line";

  const label = document.createElement("span");
  label.className = "prompt-label";
  label.textContent = promptText();

  activePromptInput = document.createElement("span");
  activePromptInput.className = "prompt-input";

  const caret = document.createElement("span");
  caret.className = "caret";

  activePromptLine.appendChild(label);
  activePromptLine.appendChild(activePromptInput);
  activePromptLine.appendChild(caret);
  output.appendChild(activePromptLine);
  output.scrollTop = output.scrollHeight;
}

function updatePrompt() {
  if (!activePromptLine) return;
  activePromptLine.querySelector(".prompt-label").textContent = promptText();
}

function updateBufferView() {
  if (!activePromptInput) return;
  activePromptInput.textContent = buffer;
  output.scrollTop = output.scrollHeight;
}

function commitPrompt(command) {
  if (!activePromptLine) return;
  const line = document.createElement("div");
  line.className = "line";
  line.textContent = promptText() + command;
  output.replaceChild(line, activePromptLine);
  activePromptLine = null;
  activePromptInput = null;
}

function normalizePath(path) {
  return path.replace(/\//g, "\\").replace(/\\\\+/g, "\\");
}

function resolvePath(input) {
  const target = (input || "").trim();
  if (!target) return currentPath;

  let working;
  if (/^[a-zA-Z]:\\/.test(target)) {
    working = normalizePath(target);
  } else if (target === "\\") {
    working = "C:\\";
  } else if (target.startsWith("\\")) {
    working = "C:" + normalizePath(target);
  } else {
    working = currentPath + "\\" + target;
  }

  const driveMatch = working.match(/^[a-zA-Z]:/);
  const drive = driveMatch ? driveMatch[0] : "C:";
  const tail = working.slice(drive.length).split("\\").filter(Boolean);
  const result = [];

  for (const part of tail) {
    if (part === ".") continue;
    if (part === "..") {
      result.pop();
      continue;
    }
    result.push(part);
  }

  return drive + "\\" + result.join("\\");
}

function getEntry(path) {
  const normalized = path.endsWith("\\") && path.length > 3 ? path.slice(0, -1) : path;
  return files[normalized];
}

function openViewer(entryPath, entry) {
  viewerTitle.textContent = entryPath;
  viewerContent.innerHTML = entry.content;
  viewer.classList.add("open");
}

viewerClose.addEventListener("click", () => {
  viewer.classList.remove("open");
});

const commands = {
  help() {
    addLine("ls  cd  cat  pwd  whoami  clear  help");
  },
  ls(args) {
    const targetPath = resolvePath(args || ".");
    const entry = getEntry(targetPath);
    if (!entry || entry.type !== "dir") {
      addLine("File Not Found");
      return;
    }
    addLine(entry.children.join("    "));
  },
  cd(args) {
    const targetPath = resolvePath(args || homeDisplayPath);
    const entry = getEntry(targetPath);
    if (!entry || entry.type !== "dir") {
      addLine("The system cannot find the path specified.");
      return;
    }
    currentPath = targetPath;
  },
  cat(args) {
    if (!args) {
      addLine("The syntax of the command is incorrect.");
      return;
    }
    const targetPath = resolvePath(args);
    const entry = getEntry(targetPath);
    if (!entry || entry.type !== "file") {
      addLine("The system cannot find the file specified.");
      return;
    }
    openViewer(targetPath, entry);
    addLine("Opening " + args);
  },
  pwd() {
    addLine(currentPath);
  },
  whoami() {
    addLine(displayName);
  },
  clear() {
    output.innerHTML = "";
  }
};

function runCommand(raw) {
  const command = raw.trim();
  if (!command) {
    commitPrompt("");
    ensurePrompt();
    updatePrompt();
    return;
  }

  history.unshift(command);
  if (history.length > 40) history.pop();
  historyIndex = -1;

  commitPrompt(command);
  const parts = command.split(/\s+/);
  const name = parts[0].toLowerCase();
  const args = command.slice(parts[0].length).trim();

  if (commands[name]) {
    commands[name](args);
  } else {
    addLine("'" + name + "' is not recognized as an internal or external command,");
    addLine("operable program or batch file.");
  }

  ensurePrompt();
  updatePrompt();
}

addLine("Microsoft Windows [Version 10.0.19045.6466]");
addLine("(c) Microsoft Corporation. All rights reserved.");
addLine("");
ensurePrompt();
updatePrompt();

document.addEventListener("keydown", (event) => {
  if (event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey) {
    buffer += event.key;
    updateBufferView();
    return;
  }

  if (event.key === "Backspace") {
    buffer = buffer.slice(0, -1);
    updateBufferView();
    return;
  }

  if (event.key === "Enter") {
    runCommand(buffer);
    buffer = "";
    updateBufferView();
    return;
  }

  if (event.key === "ArrowUp") {
    if (historyIndex < history.length - 1) {
      historyIndex += 1;
      buffer = history[historyIndex];
      updateBufferView();
    }
    return;
  }

  if (event.key === "ArrowDown") {
    if (historyIndex > 0) {
      historyIndex -= 1;
      buffer = history[historyIndex];
    } else {
      historyIndex = -1;
      buffer = "";
    }
    updateBufferView();
  }
});
</script>
</body>
</html>
